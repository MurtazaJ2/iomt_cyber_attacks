name: Autonomous PR Review & Auto-Fix Agent

on:
  pull_request:
    branches:
      - master
      
permissions:
  contents: write
  pull-requests: write
  statuses: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history so git diff works
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run PR Agent Action
        # Note: Replace 'softnauticsgithub/Code_maintenance_agent' with your actual username/repository path on GitHub
        uses: softnauticsgithub/Code_maintenance_agent@main
        with:
          openai-api-key: ${{ secrets.GROQ_API_KEY }}
          github-token: ${{ secrets.PAT_TOKEN }}
          github-model: "llama-3.3-70b-versatile"
          scan-mode: "last_commit"
          auto-merge: "true" # Set to "true" to automatically merge passing PRs
